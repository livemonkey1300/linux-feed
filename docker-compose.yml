services:
  linux-feed:
    build: .
    container_name: linux-feed
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - feed-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Set ONE of these in your .env file:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/articles"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  feed-data:
